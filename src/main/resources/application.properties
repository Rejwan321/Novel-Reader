#logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.org.springframework.jdbc=INFO

spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false
spring.datasource.generate-unique-name=false
spring.datasource.name=bookstore
spring.datasource.url=jdbc:h2:file:${DB_PATH:./data/bookstore};AUTO_SERVER=TRUE;WRITE_DELAY=0;CACHE_SIZE=131072
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sakura
spring.datasource.password=sakura
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

