spring.thymeleaf.cache=true

# Increase upload file size limits to 50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Email Configuration (Spring Boot Mail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yukitales.novel@gmail.com
spring.mail.password=${SMTP_PASSWORD:your-google-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Custom sender and recipient settings
app.mail.sender=yukitales@nazuna.dpdns.org
app.mail.recipient=yukitales.novel@gmail.com
app.base-url=http://localhost:8080
app.timezone=Asia/Kolkata

# Trust reverse proxy headers (for HTTPS redirects behind Cloudflare/Nginx)
server.forward-headers-strategy=framework

# PayU Payment Gateway settings
payu.enabled=true
payu.client.id=${PAYU_CLIENT_ID:YOUR_PAYU_CLIENT_ID}
payu.client.secret=${PAYU_CLIENT_SECRET:YOUR_PAYU_CLIENT_SECRET}
payu.merchant.key=${PAYU_MERCHANT_KEY:YOUR_PAYU_MERCHANT_KEY}
payu.merchant.salt=${PAYU_MERCHANT_SALT:YOUR_PAYU_MERCHANT_SALT}
payu.mode=test

# Razorpay Payment Gateway settings
razorpay.enabled=true
razorpay.key.id=${RAZORPAY_KEY_ID:YOUR_RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:YOUR_RAZORPAY_KEY_SECRET}
razorpay.mode=production

# Performance & Production Optimization Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.idle-timeout=10000

# HTTP Compression (GZIP)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=512

# Tomcat Thread, Connection and Keep-Alive Tuning
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=2000
server.tomcat.accept-count=500
server.tomcat.keep-alive-timeout=20s
server.tomcat.max-keep-alive-requests=150

