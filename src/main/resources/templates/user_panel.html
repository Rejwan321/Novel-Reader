<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your personal user panel. Manage your notifications, profile, and settings on Yuki Tales.">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" media="all" th:href ="@{/css/style.css(v='1.4')}"/>
    <link rel="stylesheet" type="text/css" media="all" th:href ="@{/css/login.css}"/>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <title>User Panel - Yuki Tales</title>

    <style>
        .user-panel-container {
            background: rgba(26, 21, 56, 0.5);
            border: 1px solid rgba(104, 85, 224, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .user-sidebar-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #d1d1e9;
            padding: 12px 20px;
            border-radius: 10px;
            width: 100%;
            text-align: left;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .user-sidebar-btn:hover, .user-sidebar-btn.active {
            background: linear-gradient(135deg, rgba(104, 85, 224, 0.2), rgba(189, 83, 237, 0.2));
            border-color: rgba(189, 83, 237, 0.5);
            color: #00e5ff;
            box-shadow: 0 0 15px rgba(189, 83, 237, 0.15);
        }

        .user-sidebar-btn i {
            width: 25px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            height: 100%;
        }

        .user-input {
            background-color: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 8px;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }

        .user-input:focus {
            border-color: #bd53ed !important;
            box-shadow: 0 0 8px rgba(189, 83, 237, 0.3) !important;
        }

        .form-check-input {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: #bd53ed;
            border-color: #bd53ed;
        }

        /* Notification List Styling */
        .notification-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .notification-item.unread {
            background: rgba(104, 85, 224, 0.05);
            border-color: rgba(104, 85, 224, 0.3);
        }

        .notification-item:hover {
            transform: translateY(-2px);
            border-color: rgba(189, 83, 237, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .notif-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
        }

        .notif-snippet {
            font-size: 0.85rem;
            color: #b0b0c5;
            background: rgba(0, 0, 0, 0.15);
            padding: 8px 12px;
            border-radius: 6px;
            margin: 8px 0;
            border-left: 3px solid #bd53ed;
        }

        .notif-meta {
            font-size: 0.75rem;
            color: #8c8c9e;
        }

        .notif-link {
            color: #00e5ff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .notif-link:hover {
            color: #bd53ed;
            text-decoration: underline;
        }

        .btn-action-notif {
            background: transparent;
            border: none;
            color: #8c8c9e;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-action-notif:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-action-delete:hover {
            color: #ff3366;
            background: rgba(255, 51, 102, 0.1);
        }
    </style>
</head>
<body class="dark-theme">
    <!-- Navbar -->
    <div th:replace="~{fragments/Navbar :: navbar}"></div>

    <!-- Main Container -->
    <main class="container py-4 my-5" style="min-height: 80vh;">
        <div class="user-panel-container">
            <div class="row">
                <!-- Sidebar Column -->
                <div class="col-12 col-md-3 mb-4 mb-md-0">
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
                        <div class="rounded-circle bg-violet d-flex align-items-center justify-content-center text-white me-3" style="width: 50px; height: 50px; font-size: 1.5rem; font-weight: 600;">
                            <span th:text="${#strings.substring(currentUser.name, 0, 1).toUpperCase()}">U</span>
                        </div>
                        <div>
                            <h3 class="h6 fw-bold text-white mb-0 font-outfit" th:text="${currentUser.name}">User Name</h3>
                            <span class="badge bg-secondary font-size-xs mt-1" th:text="${currentUser.user_type}">READER</span>
                        </div>
                    </div>

                    <div class="navigation-group">
                        <button class="user-sidebar-btn active" id="tab-notifications-btn" onclick="switchTab('notifications')">
                            <i class="fa-solid fa-bell text-warning me-2"></i>Notifications
                        </button>
                        <button class="user-sidebar-btn" id="tab-settings-btn" onclick="switchTab('settings')">
                            <i class="fa-solid fa-cog text-info me-2"></i>Settings & Profile
                        </button>
                    </div>
                </div>

                <!-- Panes Column -->
                <div class="col-12 col-md-9">
                    <!-- Notifications Pane -->
                    <div class="user-card" id="pane-notifications">
                        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
                            <h2 class="h4 fw-bold text-white mb-0 font-outfit">
                                <i class="fa-solid fa-bell text-warning me-2"></i>My Notifications
                            </h2>
                            <button class="btn btn-sm btn-outline-warning" onclick="loadUserNotifications()">
                                <i class="fa-solid fa-rotate me-1"></i>Refresh
                            </button>
                        </div>

                        <div id="notifications-list" class="pe-1" style="max-height: 550px; overflow-y: auto;">
                            <!-- Dynamic Content -->
                            <div class="text-center py-4 text-muted">
                                <i class="fa fa-spinner fa-spin me-2"></i>Loading notifications...
                            </div>
                        </div>
                    </div>

                    <!-- Settings Pane -->
                    <div class="user-card" id="pane-settings" style="display: none;">
                        <h2 class="h4 fw-bold text-white mb-4 pb-2 border-bottom border-secondary font-outfit">
                            <i class="fa-solid fa-cog text-info me-2"></i>Notification & Account Settings
                        </h2>

                        <form id="form-user-settings">
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label class="form-label text-muted">Account Name</label>
                                    <input type="text" class="form-control user-input" th:value="${currentUser.name}" readonly disabled>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label class="form-label text-muted">Account Email</label>
                                    <input type="text" class="form-control user-input" th:value="${currentUser.email}" readonly disabled>
                                </div>

                                <div class="col-12 mt-4">
                                    <h3 class="h6 fw-bold text-white mb-3">Email Notification Preferences</h3>
                                    
                                    <!-- Subscription check -->
                                    <div class="form-check form-switch mb-3">
                                        <input class="form-check-input" type="checkbox" id="settings-updates-checkbox" th:checked="${currentUser.subscribedToUpdates}">
                                        <label class="form-check-label text-white-50" for="settings-updates-checkbox">
                                            Subscribe to future publishes and news updates
                                        </label>
                                    </div>

                                    <!-- Mention check -->
                                    <div class="form-check form-switch mb-3">
                                        <input class="form-check-input" type="checkbox" id="settings-mentions-checkbox" th:checked="${currentUser.subscribedToMentions}">
                                        <label class="form-check-label text-white-50" for="settings-mentions-checkbox">
                                            Receive email alert when someone mentions me in a comment
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12" id="updates-email-group" th:style="${currentUser.subscribedToUpdates} ? '' : 'display: none;'">
                                    <label for="settings-updates-email" class="form-label text-muted">Custom Notification Email (Optional)</label>
                                    <input type="email" class="form-control user-input" id="settings-updates-email" placeholder="e.g. primary@example.com" th:value="${currentUser.updatesEmail != null ? currentUser.updatesEmail : currentUser.email}">
                                    <div class="form-text text-muted font-size-xs mt-1">If empty, notifications will be sent to your account email.</div>
                                </div>

                                <div class="col-12 mt-4 pt-2">
                                    <button type="submit" class="btn btn-premium px-4 py-2" id="btn-save-settings">
                                        <i class="fa-solid fa-save me-2"></i>Save Preferences
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Global Toast Notification Container -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="actionToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message-body">
                    Notification message
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="footer" class="py-4 mt-auto">
        <h4 style="font-size:12px; color: #8c8c9e;">&copy; 2026 Yuki Tales. All Rights Reserved.</h4>
    </footer>

    <!-- Scripts -->
    <script th:src="@{/scripts/Script.js(v='1.7')}"></script>
    <script th:inline="javascript">
        $(document).ready(function() {
            // Load initial notifications
            loadUserNotifications();

            // Toggle updates email block based on updates checkbox
            $('#settings-updates-checkbox').change(function() {
                if ($(this).is(':checked')) {
                    $('#updates-email-group').fadeIn(200);
                } else {
                    $('#updates-email-group').fadeOut(200);
                }
            });

            // Settings form submit
            $('#form-user-settings').submit(function(e) {
                e.preventDefault();
                var btn = $('#btn-save-settings');
                btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin me-2"></i>Saving...');

                var subscribedToUpdates = $('#settings-updates-checkbox').is(':checked');
                var subscribedToMentions = $('#settings-mentions-checkbox').is(':checked');
                var updatesEmail = $('#settings-updates-email').val();

                $.post('/api/user/settings', {
                    subscribedToUpdates: subscribedToUpdates,
                    subscribedToMentions: subscribedToMentions,
                    updatesEmail: updatesEmail
                }).done(function(res) {
                    showToast("Notification settings saved successfully!");
                    btn.prop('disabled', false).html('<i class="fa-solid fa-save me-2"></i>Save Preferences');
                    
                    // Reload updates count on navbar if any logic depends on it
                    updateNavbarUnreadBadge();
                }).fail(function(err) {
                    showToast("Error saving settings: " + (err.responseJSON ? err.responseJSON.error : "Unknown error"), "error");
                    btn.prop('disabled', false).html('<i class="fa-solid fa-save me-2"></i>Save Preferences');
                });
            });
        });

        // Tab Switcher
        function switchTab(tab) {
            $('.user-sidebar-btn').removeClass('active');
            $('#tab-' + tab + '-btn').addClass('active');

            if (tab === 'notifications') {
                $('#pane-notifications').show();
                $('#pane-settings').hide();
                loadUserNotifications();
            } else if (tab === 'settings') {
                $('#pane-notifications').hide();
                $('#pane-settings').show();
            }
        }

        // Load notifications via REST
        function loadUserNotifications() {
            var container = $("#notifications-list");
            container.html('<div class="text-center py-4 text-muted"><i class="fa fa-spinner fa-spin me-2"></i>Loading notifications...</div>');

            $.get("/api/user/notifications")
                .done(function(notifications) {
                    if (!notifications || notifications.length === 0) {
                        container.html('<div class="text-center py-5 text-muted"><i class="fa-regular fa-bell-slash display-4 mb-3 d-block"></i>You have no notifications yet.</div>');
                        return;
                    }

                    container.empty();
                    notifications.forEach(function(notif) {
                        var dateStr = notif.createdAt ? new Date(notif.createdAt).toLocaleString() : 'N/A';
                        var isUnread = !notif.read;
                        
                        var itemHtml = `
                            <div class="notification-item ${isUnread ? 'unread' : ''}" id="notif-card-${notif.id}">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                         <div class="notif-title">
                                             ${notif.comment ? `
                                                 <span class="text-info">@${notif.mentionerName}</span> mentioned you in a comment on 
                                             ` : `
                                                 New chapter published for 
                                             `}
                                             <a href="/novel/${notif.novelId}/read/${notif.chapterNumber}" class="notif-link fw-bold">${notif.novelTitle} - Ch. ${notif.chapterNumber}</a>
                                         </div>
                                         <div class="notif-snippet">${notif.comment ? `"${notif.snippet}"` : `${notif.snippet}`}</div>
                                        <div class="notif-meta">
                                            <i class="fa-regular fa-clock me-1"></i>${dateStr}
                                            <span class="ms-3 badge ${isUnread ? 'bg-warning text-dark' : 'bg-secondary'}" id="notif-badge-${notif.id}">
                                                ${isUnread ? 'Unread' : 'Read'}
                                            </span>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-1">
                                        <button class="btn-action-notif" onclick="toggleNotifRead(${notif.id}, ${isUnread})" title="${isUnread ? 'Mark as Read' : 'Mark as Unread'}">
                                            <i class="fa-solid ${isUnread ? 'fa-envelope-open' : 'fa-envelope'}"></i>
                                        </button>
                                        <button class="btn-action-notif btn-action-delete" onclick="deleteNotif(${notif.id})" title="Delete Notification">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.append(itemHtml);
                    });
                    
                    updateNavbarUnreadBadge();
                })
                .fail(function(err) {
                    container.html('<div class="text-center py-4 text-danger">Error loading notifications: ' + (err.responseJSON ? err.responseJSON.error : "Unknown error") + '</div>');
                });
        }

        // Toggle Read / Unread Status
        function toggleNotifRead(id, currentUnread) {
            $.ajax({
                url: '/api/user/notifications/' + id + '/toggle-read',
                type: 'PUT'
            }).done(function(res) {
                var card = $("#notif-card-" + id);
                var badge = $("#notif-badge-" + id);
                
                if (res.isRead) {
                    card.removeClass('unread');
                    badge.removeClass('bg-warning text-dark').addClass('bg-secondary').text('Read');
                } else {
                    card.addClass('unread');
                    badge.removeClass('bg-secondary').addClass('bg-warning text-dark').text('Unread');
                }
                
                // Refresh list to keep toggle click actions aligned
                loadUserNotifications();
            }).fail(function(err) {
                showToast("Failed to update status.", "error");
            });
        }

        // Delete Notification
        function deleteNotif(id) {
            if (confirm("Are you sure you want to delete this notification?")) {
                $.ajax({
                    url: '/api/user/notifications/' + id,
                    type: 'DELETE'
                }).done(function() {
                    $("#notif-card-" + id).fadeOut(300, function() {
                        $(this).remove();
                        // If empty, reload to show empty state
                        if ($(".notification-item").length === 0) {
                            loadUserNotifications();
                        } else {
                            updateNavbarUnreadBadge();
                        }
                    });
                    showToast("Notification deleted.");
                }).fail(function() {
                    showToast("Failed to delete notification.", "error");
                });
            }
        }

        // Toast Helper
        function showToast(message, type = "success") {
            var toastEl = document.getElementById('actionToast');
            if (!toastEl) return;
            var toastBody = document.getElementById('toast-message-body');
            toastBody.innerText = message;
            toastEl.className = "toast align-items-center text-white border-0";
            if (type === "success") {
                toastEl.style.backgroundColor = "rgba(40, 167, 69, 0.9)";
            } else {
                toastEl.style.backgroundColor = "rgba(220, 53, 69, 0.9)";
            }
            var toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        // Sync count to navbar dynamically (Fixed to update dropdown count badge too)
        function updateNavbarUnreadBadge() {
            $.get("/api/user/notifications/unread-count")
                .done(function(res) {
                    if (res.count > 0) {
                        $("#navbar-unread-badge").removeClass('d-none');
                        $("#navbar-unread-dropdown-badge").text(res.count).removeClass('d-none');
                    } else {
                        $("#navbar-unread-badge").addClass('d-none');
                        $("#navbar-unread-dropdown-badge").addClass('d-none');
                    }
                });
        }

        // SSE Real-time Notification Prepend
        window.appendNotificationRealtime = function(notif) {
            var container = $("#notifications-list");
            
            // Remove empty placeholder if present
            if (container.children().first().text().indexOf("no notifications yet") !== -1) {
                container.empty();
            }
            
            var dateStr = notif.createdAt ? new Date(notif.createdAt).toLocaleString() : new Date().toLocaleString();
            var isUnread = !notif.read;
            
            var itemHtml = `
                <div class="notification-item ${isUnread ? 'unread' : ''}" id="notif-card-${notif.id}" style="display: none;">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                             <div class="notif-title">
                                 ${notif.comment ? `
                                     <span class="text-info">@${notif.mentionerName}</span> mentioned you in a comment on 
                                 ` : `
                                     New chapter published for 
                                 `}
                                 <a href="/novel/${notif.novelId}/read/${notif.chapterNumber}" class="notif-link fw-bold">${notif.novelTitle} - Ch. ${notif.chapterNumber}</a>
                             </div>
                             <div class="notif-snippet">${notif.comment ? `"${notif.snippet}"` : `${notif.snippet}`}</div>
                            <div class="notif-meta">
                                <i class="fa-regular fa-clock me-1"></i>${dateStr}
                                <span class="ms-3 badge ${isUnread ? 'bg-warning text-dark' : 'bg-secondary'}" id="notif-badge-${notif.id}">
                                    ${isUnread ? 'Unread' : 'Read'}
                                </span>
                            </div>
                        </div>
                        <div class="d-flex gap-1">
                            <button class="btn-action-notif" onclick="toggleNotifRead(${notif.id}, ${isUnread})" title="${isUnread ? 'Mark as Read' : 'Mark as Unread'}">
                                <i class="fa-solid ${isUnread ? 'fa-envelope-open' : 'fa-envelope'}"></i>
                            </button>
                            <button class="btn-action-notif btn-action-delete" onclick="deleteNotif(${notif.id})" title="Delete Notification">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            var newNotif = $(itemHtml);
            container.prepend(newNotif);
            newNotif.slideDown(300);
            
            // Sync badges
            updateNavbarUnreadBadge();
        };
    </script>
</body>
</html>
